{% extends "entries/base.html" %}

{% block content %}
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">New Journal Entry</h2>

        <form method="POST">
            {% csrf_token %}
            {{form.media}}

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    {{form.date_created}}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                    {{form.title}}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">How are you feeling?</label>
                    {{form.mood}}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">What's on your mind?</label>
                    {{form.content}}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2 text-indigo-600 font-bold">Habits Completed:</label>
                    <div class="grid grid-cols02 gap-2 bg-gray-50 p-4 rounded-lg">
                        {{form.habits_completed}}
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">
                        Save Entry
                    </button>
                    <a href="{% url 'entry-list' %}" class="block text-center mt-4 text-gray-500 hover:text-gray-700 text-sm">Cancel</a>
                </div>
            </div>
        </form>
    </div>

{% endblock content %}
